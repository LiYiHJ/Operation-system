{% extends 'base.html' %}
{% block title %}报告详情 | V5.1{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">报告详情 #{{ report.id }}</h3>
  <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('reports.reports_index') }}">返回报告列表</a>
</div>
<div class="row g-3">
  <div class="col-md-6"><div class="card p-3"><h6>Markdown 内容</h6><pre class="mb-0">{{ report.content_md }}</pre></div></div>
  <div class="col-md-6"><div class="card p-3"><h6>JSON 内容</h6><pre class="mb-0">{{ report.content_json|tojson(indent=2) }}</pre></div></div>
</div>
{% endblock %}
