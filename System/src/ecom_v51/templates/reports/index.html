{% extends 'base.html' %}
{% block title %}报告中心 | V5.1{% endblock %}
{% block content %}
<h3 class="mb-3">报告中心</h3>
<form class="row g-2 mb-3" method="get">
  <div class="col-md-3"><input class="form-control" name="type" value="{{ report_type }}" placeholder="报告类型：daily / weekly"></div>
  <div class="col-auto"><button class="btn btn-primary">筛选</button></div>
</form>

<div class="table-responsive card p-2">
<table class="table table-sm table-striped align-middle mb-0">
  <thead class="table-light"><tr><th>ID</th><th>报告类型</th><th>日期</th><th>标题</th><th>摘要</th><th>操作</th></tr></thead>
  <tbody>
    {% if rows %}
      {% for r in rows %}
      <tr>
        <td>{{ r.id }}</td>
        <td>{{ r.report_type }}</td>
        <td>{{ r.report_date }}</td>
        <td>{{ r.title }}</td>
        <td>{{ r.summary }}</td>
        <td><a class="btn btn-sm btn-outline-primary" href="{{ url_for('reports.report_detail', report_id=r.id) }}">查看详情</a></td>
      </tr>
      {% endfor %}
    {% else %}
      <tr><td colspan="6" class="text-center text-muted py-4">暂无报告。</td></tr>
    {% endif %}
  </tbody>
</table>
</div>
{% endblock %}
