services:
  db:
    image: postgres:15
    container_name: ecom-v51-db
    environment:
      POSTGRES_DB: ecom_v51
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: strong_password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ecom-v51-redis
    ports:
      - "6379:6379"

volumes:
  pg_data: